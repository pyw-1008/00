<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>观众页</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="page page-mobile">
  <main class="audience-shell">
    <section class="vote-panel">
      <p class="eyebrow">现场投票</p>
      <h1 id="questionTitle">正在加载题目...</h1>
      <form id="voteForm" class="option-list">
        <div id="options" class="option-list"></div>
        <button id="submitVote" class="primary-button" type="submit" disabled>提交投票</button>
      </form>
      <p id="feedback" class="feedback" aria-live="polite"></p>
    </section>
    <section class="message-panel">
      <p class="eyebrow">一句话留言</p>
      <form id="messageForm" class="message-form">
        <textarea id="messageInput" maxlength="50" rows="3" placeholder="输入 50 字以内的留言"></textarea>
        <div class="message-actions">
          <span id="messageCount">0/50</span>
          <button id="submitMessage" class="primary-button" type="submit">发送留言</button>
        </div>
      </form>
      <p id="messageFeedback" class="feedback" aria-live="polite"></p>
    </section>
  </main>
  <script src="/audience.js"></script>
</body>
</html>
